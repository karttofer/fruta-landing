<!doctype html>
<!-- data-theme picks the active scheme from theme.muten (dark | light). It's the default; toggle it at runtime
     to switch themes (a theme.store + a `use` fn that sets document.documentElement.dataset.theme). -->
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fruta — a tiny, friendly 2D graphics library</title>
  <meta name="description" content="Fruta is a tiny, TypeScript-first 2D graphics + game library over Canvas — a low-learning-curve, framework-friendly p5.js.">
  <meta name="theme-color" content="#faf8ef">
  <!-- favicons (public/ is served at root) -->
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="Fruta">
  <link rel="manifest" href="/site.webmanifest">
  <!-- Google Fonts for the canvas UI: Fraunces (display), Space Grotesk (UI), JetBrains Mono (code). -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800;9..144,900&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/app.muten"></script>
</body>
</html>
